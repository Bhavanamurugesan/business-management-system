<!DOCTYPE html>
<html>

<head>

    <title>Edit Product</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1>Edit Product</h1>

<form method="POST"
      action="/update_product/{{ product[0] }}">

    <input type="text"
           name="name"
           value="{{ product[1] }}"
           required>

    <br><br>

    <input type="number"
           name="price"
           value="{{ product[2] }}"
           required>

    <br><br>

    <input type="number"
           name="quantity"
           value="{{ product[3] }}"
           required>

    <br><br>

    <button type="submit">
        Update Product
    </button>

</form>

</body>
</html>
