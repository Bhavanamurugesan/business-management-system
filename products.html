<!DOCTYPE html>
<html>

<head>

    <title>Products</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</head>

<body>

<a href="/">Home</a>

<br><br>

<a href="/customers">Customers</a>

<br><br>

<a href="/sales">Sales</a>

<hr>

<h1>Product Page</h1>

<button onclick="darkMode()">
    Dark Mode
</button>

<br><br>

<form method="POST" action="/add_product">

    <input type="text"
           name="product_name"
           placeholder="Enter Product Name"
           required>

    <br><br>

    <input type="number"
           name="quantity"
           placeholder="Enter Quantity"
           required>

    <br><br>

    <input type="number"
           step="0.01"
           name="price"
           placeholder="Enter Price"
           required>

    <br><br>

    <button type="submit">
        Add Product
    </button>

</form>

<hr>

<h2>Product List</h2>

<input type="text"
       id="searchInput"
       onkeyup="searchTable()"
       placeholder="Search Product">

<br><br>

<table border="1" cellpadding="10">

<tr>
    <th>ID</th>
    <th>Product Name</th>
    <th>Quantity</th>
    <th>Price</th>
    <th>Action</th>
</tr>

{% for product in products %}

<tr>

    <td>{{ product[0] }}</td>
    <td>{{ product[1] }}</td>
    <td>{{ product[2] }}</td>
    <td>{{ product[3] }}</td>

    <td>
<a href="/edit_product/{{ product[0] }}">
        Edit
    </a>

    |

    <a href="/delete_product/{{ product[0] }}">
        Delete
    </a>

    </td>

</tr>

{% endfor %}

</table>

</body>
</html>
