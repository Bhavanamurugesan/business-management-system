<!DOCTYPE html>
<html>

<head>

    <title>Edit Customer</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1>Edit Customer</h1>

<form method="POST"
      action="/update_customer/{{ customer[0] }}">

    <input type="text"
           name="name"
           value="{{ customer[1] }}">

    <br><br>

    <input type="text"
           name="phone"
           value="{{ customer[2] }}">

    <br><br>

    <input type="email"
           name="email"
           value="{{ customer[3] }}">

    <br><br>

    <button type="submit">
        Update Customer
    </button>

</form>

</body>
</html>
