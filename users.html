<!DOCTYPE html>
<html>

<head>

    <title>Users</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1>Users Page</h1>

<form method="POST"
      action="/add_user">

    <input type="text"
           name="username"
           placeholder="Enter Username"
           required>

    <br><br>

    <input type="email"
           name="email"
           placeholder="Enter Email"
           required>

    <br><br>

    <button type="submit">
        Add User
    </button>

</form>

<hr>

<h2>User List</h2>

<table border="1" cellpadding="10">

<tr>
    <th>ID</th>
    <th>Username</th>
    <th>Email</th>
</tr>

{% for user in users %}

<tr>

    <td>{{ user[0] }}</td>
    <td>{{ user[1] }}</td>
    <td>{{ user[2] }}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
