<!DOCTYPE html>
<html>

<head>

    <title>Sales</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<a href="/">Home</a>

<br><br>

<a href="/customers">Customers</a>

<br><br>

<a href="/products">Products</a>

<hr>

<h1>Sales Page</h1>

<button onclick="darkMode()">
    Dark Mode
</button>

<br><br>

<form method="POST" action="/add_sale">

    <input type="text"
           name="customer_name"
           placeholder="Customer Name"
           required>

    <br><br>

    <input type="text"
           name="product_name"
           placeholder="Product Name"
           required>

    <br><br>

    <input type="number"
           name="quantity"
           placeholder="Quantity"
           required>

    <br><br>

    <input type="number"
           step="0.01"
           name="total"
           placeholder="Total Amount"
           required>

    <br><br>

    <button type="submit">
        Add Sale
    </button>

</form>

<hr>

<h2>Sales List</h2>

<h2>
    Total Sales:
    ₹ {{ total_sales }}
</h2>

<input type="text"
       id="searchInput"
       onkeyup="searchTable()"
       placeholder="Search Sales">

<br><br>

<table border="1" cellpadding="10">

<tr>
    <th>ID</th>
    <th>Customer</th>
    <th>Product</th>
    <th>Quantity</th>
    <th>Total</th>
    <th>Action</th>
</tr>

{% for sale in sales %}

<tr>

    <td>{{ sale[0] }}</td>
    <td>{{ sale[1] }}</td>
    <td>{{ sale[2] }}</td>
    <td>{{ sale[3] }}</td>
    <td>{{ sale[4] }}</td>

    <td>

        <a href="/delete_sale/{{ sale[0] }}">
            Delete
        </a>

    </td>

</tr>

{% endfor %}

</table>

<br><br>

<canvas id="salesChart"></canvas>

<script>

const ctx = document.getElementById('salesChart');

new Chart(ctx, {

    type: 'bar',

    data: {

        labels: ['Total Sales'],

        datasets: [{

            label: 'Sales Amount',

            data: ["{{ total_sales if total_sales else 0 }}"],

            borderWidth: 1

        }]

    },

    options: {

        scales: {

            y: {

                beginAtZero: true

            }

        }

    }

});

</script>
</body>
</html>
