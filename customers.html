<!DOCTYPE html>
<html>

<head>

    <title>Customers</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</head>

<body>

<a href="/">Home</a>

<br><br>

<a href="/products">Products</a>

<br><br>

<a href="/sales">Sales</a>

<hr>

<h1>Customer Page</h1>

<button onclick="darkMode()">
    Dark Mode
</button>

<br><br>

<form method="POST" action="/add_customer">

    <input type="text"
           name="name"
           placeholder="Enter Name"
           required>

    <br><br>

    <input type="text"
           name="phone"
           placeholder="Enter Phone"
           required>

    <br><br>

    <input type="email"
           name="email"
           placeholder="Enter Email"
           required>

    <br><br>

    <button type="submit">
        Add Customer
    </button>

</form>

<hr>

<h2>Customer List</h2>

<input type="text"
       id="searchInput"
       onkeyup="searchTable()"
       placeholder="Search Customer">

<br><br>

<table border="1" cellpadding="10">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Phone</th>
    <th>Email</th>
    <th>Action</th>
</tr>

{% for customer in customers %}

<tr>

    <td>{{ customer[0] }}</td>
    <td>{{ customer[1] }}</td>
    <td>{{ customer[2] }}</td>
    <td>{{ customer[3] }}</td>

    <td>

        <a href="/edit_customer/{{ customer[0] }}">
            Edit
        </a>

        |

        <a href="/delete_customer/{{ customer[0] }}">
            Delete
        </a>

    </td>

</tr>

{% endfor %}

</table>

</body>
</html>
